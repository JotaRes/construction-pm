# ============================================================
# CI — se ejecuta en cada push a main y en cada Pull Request.
# Verifica lo que antes dependía de memoria humana (regla de oro #3):
#   1. Que el schema Prisma tenga provider postgresql (nunca sqlite)
#   2. Que el backend compile sin errores (tsc --noEmit)
#   3. Que el frontend compile y buildee sin errores
# Si algo falla, GitHub marca el commit con ❌ — revisar antes de confiar
# en ese deploy (Render deploya en paralelo; el CI es tu señal de alarma).
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guard-schema:
    name: Guard — provider postgresql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar que el provider NO es sqlite
        run: |
          if grep -q 'provider = "sqlite"' backend/prisma/schema.prisma; then
            echo "::error::schema.prisma tiene provider sqlite — esto ROMPE producción. Cambiar a postgresql."
            exit 1
          fi
          echo "✓ provider postgresql confirmado"
      - name: Verificar que no hay secretos hardcodeados
        run: |
          # Patrones partidos en dos para que este archivo no se detecte a sí mismo
          P1="1841""8598"; P2="construction""2024"; P3="construction-pm-""secret"
          if grep -rn "$P1\|$P2\|$P3" --include="*.ts" --include="*.tsx" --include="*.yaml" --include="*.yml" backend/src frontend/src render.yaml; then
            echo "::error::Se detectaron credenciales hardcodeadas en el código."
            exit 1
          fi
          echo "✓ sin credenciales hardcodeadas"

  backend:
    name: Backend — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --include=dev
        working-directory: backend
      - run: npx prisma generate
        working-directory: backend
      - run: npx tsc --noEmit
        working-directory: backend

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --include=dev
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
