services:
  - type: web
    name: restrepoacosta
    runtime: node
    rootDir: backend
    autoDeploy: yes
    # Build phase — desde rootDir (backend/)
    #   1) Instala deps backend (incluye devDeps de TS)
    #   2) Instala deps frontend FORZANDO devDeps (Vite, Tailwind, PostCSS)
    #   3) Compila el frontend y copia el bundle a backend/public/
    #   4) Switches provider Prisma a postgresql para producción
    buildCommand: |
      set -e
      echo "=== [1/6] Switching Prisma provider to postgresql BEFORE npm ci ==="
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
      echo "--- schema head after sed ---"
      head -10 prisma/schema.prisma
      echo "=== [2/6] Backend deps ==="
      npm ci --include=dev
      echo "=== [3/6] Frontend build ==="
      cd ../frontend
      npm ci --include=dev
      npm run build
      echo "=== [4/6] Copying frontend bundle to backend/public ==="
      cd ../backend
      rm -rf public
      mkdir -p public
      cp -R ../frontend/dist/. public/
      ls -la public/
      echo "=== [5/6] Prisma generate (postgresql) ==="
      npx prisma generate
      echo "=== [6/6] Prisma DB push ==="
      npx prisma db push --accept-data-loss
      echo "=== Build complete ==="
    # Start phase — solo arranca la app; prisma ya está listo desde build
    startCommand: npx tsx src/app.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: construction-pm-secret-2026
      - key: APP_PASSWORD
        value: 18418598
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
