services:
  - type: web
    name: restrepoacosta
    runtime: node
    rootDir: backend
    # Build phase — todo desde el rootDir (backend/)
    #   1) Instala deps backend (incluye devDeps de TS)
    #   2) Instala deps frontend FORZANDO devDeps (Vite, Tailwind, PostCSS están ahí)
    #   3) Compila el frontend y copia el bundle a backend/public/
    #   4) Switches provider Prisma a postgresql para producción
    buildCommand: |
      set -e
      echo "=== Backend deps ==="
      npm ci --include=dev
      echo "=== Frontend build ==="
      cd ../frontend
      npm ci --include=dev
      npm run build
      echo "=== Copying frontend bundle to backend/public ==="
      cd ../backend
      rm -rf public
      mkdir -p public
      cp -R ../frontend/dist/. public/
      ls -la public/
      echo "=== Switching Prisma providers to postgresql ==="
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/finance.prisma
      sed -i 's|env("DATABASE_URL_FIN")|env("DATABASE_URL")|' prisma/finance.prisma
      echo "=== Build complete ==="
    # Start phase
    #   1) Genera ambos clientes Prisma (tech default + finance custom output)
    #   2) Aplica ambos schemas a la DB Postgres
    #   3) Arranca el servidor con tsx (TypeScript runtime, no requiere compilar a dist/)
    startCommand: |
      set -e
      npx prisma generate
      npx prisma generate --schema=prisma/finance.prisma
      npx prisma db push --accept-data-loss
      npx prisma db push --schema=prisma/finance.prisma --accept-data-loss
      npx tsx src/app.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: construction-pm-secret-2026
      - key: APP_PASSWORD
        value: 18418598
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
