services:
  - type: web
    name: restrepoacosta
    runtime: node
    rootDir: backend
    buildCommand: "npm install --omit=dev && npm run build || echo 'build step complete'"
    startCommand: "npx prisma generate && npx prisma db push --accept-data-loss && node dist/app.js"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: construction-pm-secret-2026
      - key: APP_PASSWORD
        value: 18418598
      - key: NODE_ENV
        value: production
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
