services:
  - type: web
    name: restrepoacosta
    runtime: node
    rootDir: backend
    autoDeploy: yes
    # Build phase — desde rootDir (backend/)
    #   1) Instala deps backend (incluye devDeps de TS)
    #   2) Instala deps frontend FORZANDO devDeps (Vite, Tailwind, PostCSS)
    #   3) Compila el frontend y copia el bundle a backend/public/
    #   4) Switches provider Prisma a postgresql para producción
    buildCommand: |
      set -e
      echo "=== [1/3] Backend deps ==="
      npm ci --include=dev
      echo "=== [2/3] Frontend build ==="
      cd ../frontend
      npm ci --include=dev
      npm run build
      echo "=== [3/3] Copy bundle to backend/public ==="
      cd ../backend
      rm -rf public
      mkdir -p public
      cp -R ../frontend/dist/. public/
      ls -la public/
      echo "=== Build complete ==="
    # Start phase — sed corre AQUÍ porque Render provee el schema desde git
    # (los source files se resetean entre build y start, solo artifacts persisten)
    startCommand: |
      set -e
      echo "=== Fixing Prisma provider for production ==="
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
      echo "provider after sed:"; grep provider prisma/schema.prisma | head -3
      echo "=== Prisma generate ==="
      npx prisma generate
      echo "=== Prisma DB push ==="
      npx prisma db push --accept-data-loss
      echo "=== Starting app ==="
      exec npx tsx src/app.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: construction-pm-secret-2026
      - key: APP_PASSWORD
        value: 18418598
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
