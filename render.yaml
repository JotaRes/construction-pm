services:
  - type: web
    name: restrepoacosta
    runtime: node
    rootDir: backend
    # Build phase — desde rootDir (backend/)
    #   1) Instala deps backend (incluye devDeps de TS)
    #   2) Instala deps frontend FORZANDO devDeps (Vite, Tailwind, PostCSS)
    #   3) Compila el frontend y copia el bundle a backend/public/
    #   4) Switches provider Prisma a postgresql para producción
    buildCommand: |
      set -e
      echo "=== Backend deps ==="
      npm ci --include=dev
      echo "=== Frontend build ==="
      cd ../frontend
      npm ci --include=dev
      npm run build
      echo "=== Copying frontend bundle to backend/public ==="
      cd ../backend
      rm -rf public
      mkdir -p public
      cp -R ../frontend/dist/. public/
      ls -la public/
      echo "=== Switching Prisma provider to postgresql ==="
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
      echo "=== Build complete ==="
    # Start phase
    #   1) Genera el cliente Prisma (tech + finance en un solo schema)
    #   2) Aplica el schema a la DB Postgres (un solo push, sin colisiones)
    #   3) Arranca con tsx runtime
    startCommand: |
      set -e
      npx prisma generate
      npx prisma db push --accept-data-loss
      npx tsx src/app.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: construction-pm-secret-2026
      - key: APP_PASSWORD
        value: 18418598
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
