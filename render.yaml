services:
  - type: web
    name: construction-pm
    runtime: node
    rootDir: backend
    buildCommand: "npm install && npx prisma generate && npm run build"
    startCommand: "npx prisma migrate deploy && npx tsx prisma/seed.ts && node dist/app.js"
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: construction-pm-secret-2026
      - key: APP_PASSWORD
        value: 18418598
      - key: NODE_ENV
        value: production
