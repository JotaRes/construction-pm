<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport optimizado para móvil + soporte de safe-area en iPhone con notch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- Identidad -->
    <title>Restrepo Acosta — Ecosistema operativo</title>
    <meta name="description" content="Sistema integral de gestión de proyectos de construcción y finanzas — Restrepo Acosta Global Holding LLC" />
    <meta name="theme-color" content="#2D4B52" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/icon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- PWA — Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS — instalable como app desde Safari (Compartir → Agregar a inicio) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="R&A" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120.png" />

    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph (link previews en WhatsApp/Telegram) -->
    <meta property="og:title" content="Restrepo Acosta — Ecosistema operativo" />
    <meta property="og:description" content="Sistema integral de gestión de proyectos y finanzas" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:type" content="website" />

    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

    <style>
      /* Safe-area en iPhone con notch */
      :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
      /* Evitar zoom involuntario al hacer tap en inputs en iOS (Apple fuerza zoom si font <16px) */
      @media (max-width: 768px) { input, select, textarea { font-size: 16px !important; } }
      /* Loading splash mínimo mientras carga el bundle de React */
      #app-loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #EAE5DF; z-index: 9999; transition: opacity .3s; font-family: 'Inter', system-ui; }
      #app-loading.hidden { opacity: 0; pointer-events: none; }
      #app-loading-text { font-family: Georgia, serif; color: #2D4B52; font-size: 14px; letter-spacing: 0.1em; }
    </style>
  </head>
  <body style="background-color:#EAE5DF;">
    <div id="app-loading">
      <div id="app-loading-text">RESTREPO ACOSTA · cargando…</div>
    </div>
    <div id="root"></div>
    <!--
      IMPORTANTE: NO agregar scripts inline aquí.
      El CSP del backend (script-src 'self') bloquea cualquier <script> inline.
      Toda la lógica de bootstrap (ocultar splash, registrar SW, limpiar cache)
      vive en src/main.tsx — que sí está permitido porque es del mismo origen.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
